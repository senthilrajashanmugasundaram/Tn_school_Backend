server:
  port: ${PORT:8080}

spring:
  application:
    name: tn-school-sms-backend
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:tnschool;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:ZmFrZS1kZXZlbG9wbWVudC1zZWNyZXQtbXVzdC1iZS1yZXBsYWNlZC1pbS1ub3QtcHJvZA==}
    access-token-minutes: ${JWT_ACCESS_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
