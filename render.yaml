services:
  - type: web
    name: tn-school-sms-api
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/sms-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
